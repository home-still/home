# home-still configuration
#
# Two directories:
#   ~/.home-still/     — config, cache, models (hidden, always local)
#   ~/home-still/      — papers, markdown (visible, your research project)

# --- General settings ---
home:
  # Project directory — your research data (papers, markdown)
  # May point to an NFS mount or symlink
  # project_dir: ~/home-still
  # log_dir: ~/home-still/logs  # default: {project_dir}/logs

# --- Paper search & download ---
paper:
  # Where downloaded PDFs are saved (default: ~/home-still/papers)
  # download_path: ~/home-still/papers
  # Drop manually downloaded papers here for automatic processing:
  #   ~/home-still/papers/manually_downloaded/

  # Search providers
  providers:
    arxiv:
      base_url: http://export.arxiv.org/api/query
      timeout_secs: 30
      rate_limit_interval_ms: 3000

    openalex:
      base_url: http://api.openalex.org
      # api_key: your-key-here
      timeout_secs: 30
      rate_limit_interval_ms: 100

  # Download settings
  download:
    # Email for Unpaywall API
    # unpaywall_email: you@example.com
    # API key for CORE (https://core.ac.uk/services/api)
    # core_api_key: your-key-here
    max_concurrent: 4
    timeout_secs: 120

  # Resilience patterns
  resilience:
    cb_initial_backoff_secs: 10
    cb_max_backoff_secs: 60
    cb_failure_threshold: 3
    retry_max_attempts: 5
    retry_min_backoff_ms: 100
    retry_max_backoff_secs: 30

# --- Storage backend (papers, markdown, catalog) -----------------------
# Default is the local filesystem rooted at {home.project_dir}.
# To move everything to MinIO/S3, set backend: s3 and fill in the `s3:` block.
# Secrets support ${ENV_VAR} expansion at load time.
storage:
  backend: local          # local | s3
  local:
    root: ~/home-still
  # s3:
  #   endpoint: http://three:9000
  #   bucket: papers
  #   region: us-east-1
  #   access_key: hs-admin
  #   secret_key: ${HS_S3_SECRET_KEY}
  #   allow_http: true

# --- Event bus (cross-node notifications) ------------------------------
# `noop` drops publishes and never yields events — the default, which keeps
# the legacy filesystem-watcher flow untouched.
# `nats` connects to a NATS server; pairs with `hs scribe watch-events` and
# `hs distill watch-events` to run the event-driven pipeline.
events:
  backend: noop           # noop | nats
  # nats:
  #   url: nats://three:4222

# --- Scribe PDF conversion ---
scribe:
  # Output directory for converted markdown (default: ~/home-still/markdown)
  # output_dir: ~/home-still/markdown

  # Directory to watch for new PDFs (default: ~/home-still/papers)
  # watch_dir: ~/home-still/papers

  # Scribe servers (PDFs are load-balanced across all servers)
  servers:
    - http://localhost:7433
