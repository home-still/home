services:
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: ollama-e2e
    ports:
      - "11434:11434"
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  scribe:
    image: ${SCRIBE_IMAGE:-ghcr.io/home-still/hs-scribe-server}:${SCRIBE_TAG:-latest}
    container_name: scribe-e2e
    ports:
      - "7433:7433"
    volumes:
      - ${MODELS_DIR:-/tmp/models}:/models:ro
    environment:
      HS_SCRIBE_BACKEND: Ollama
      HS_SCRIBE_OLLAMA_URL: http://ollama:11434
      HS_SCRIBE_MODEL: moondream
      HS_SCRIBE_LAYOUT_MODEL_PATH: /models/pp-doclayoutv3.onnx
      HS_SCRIBE_USE_CUDA: "false"
      HS_SCRIBE_VLM_CONCURRENCY: "1"
      HS_SCRIBE_REGION_PARALLEL: "1"
      HS_SCRIBE_TIMEOUT_SECS: "300"
      HS_SCRIBE_DPI: "150"
    depends_on:
      ollama:
        condition: service_healthy
