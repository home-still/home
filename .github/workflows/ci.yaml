name: Home Still Build

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always


jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt -p hs -p paper -p hs-style -p hs-scribe --check      
      - run: cargo clippy --workspace --all-targets -- -D warnings          
        if: matrix.os == 'ubuntu-latest'                                    
      - run: cargo clippy --workspace --exclude hs-scribe --all-targets -- -D warnings                                                                 
        if: matrix.os != 'ubuntu-latest'                        
      - run: cargo test --workspace --exclude hs-scribe                     
      - run: cargo test -p hs-scribe --features server          
        if: matrix.os == 'ubuntu-latest'                                    
  